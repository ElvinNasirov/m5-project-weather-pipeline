<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaFit AI - AI Weather & Activity Recommendations</title>
    <meta name="description"
        content="AI-powered 1-month weather forecast and activity recommendation platform for tourism.">
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/index.css">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- Animated background blobs -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo">
                <i class="fa-solid fa-cloud-sun fa-2x"></i>
            </div>
            <h1>ClimaFit <span class="accent">AI</span></h1>
            <p>Smart Weather, Travel Better</p>
        </header>

        <main>
            <!-- Form Section -->
            <section class="form-section glass-panel">
                <form id="forecast-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="location"><i class="fa-solid fa-location-dot"></i> Select Region</label>
                            <div class="select-wrapper">
                                <select id="location" required>
                                    <option value="" disabled selected>Choose a destination...</option>
                                    <option value="Baku">Baku</option>
                                    <option value="Lankaran">Lankaran</option>
                                    <option value="Guba">Guba</option>
                                    <option value="Gabala">Gabala</option>
                                    <option value="Shaki">Shaki</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-icon"></i>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="date"><i class="fa-regular fa-calendar"></i> Select Date</label>
                            <input type="date" id="date" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span id="btn-text">Get Forecast <i class="fa-solid fa-arrow-right"></i></span>
                        <div class="spinner hidden" id="loading-spinner"></div>
                    </button>
                </form>
            </section>

            <!-- Results Section (Hidden initially) -->
            <section class="results-section hidden" id="results-section">
                <!-- Weather and Activities will be injected here via JS -->
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="src/components/WeatherCard.js"></script>
    <script src="src/components/ActivityList.js"></script>
    <script src="src/app.js"></script>
</body>

</html>
