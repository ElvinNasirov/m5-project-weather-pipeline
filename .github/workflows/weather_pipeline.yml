name: Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    # Runs every 3 days at 06:00 UTC
    - cron: "0 6 */3 * *"

jobs:
  run-weather-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather pipeline
        run: |
          python -m src.pipeline

      - name: Verify forecast output
        run: |
          python - <<'PY'
          from src.db import run_query

          result = run_query("""
          SELECT city, source, COUNT(*) AS rows
          FROM analytics.final_28d_forecast
          GROUP BY city, source
          ORDER BY city, source
          """)

          print(result)

          total_rows = run_query("""
          SELECT COUNT(*) AS rows
          FROM analytics.final_28d_forecast
          """)

          rows = int(total_rows["rows"].iloc[0])

          if rows != 140:
              raise ValueError(f"Expected 140 forecast rows, got {rows}")

          print("Forecast verification passed.")
          PY

      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-duckdb
          path: data/weather.duckdb
